name: Update blocklists

on:
  push:
    paths:
      - 'sources/**.txt'
      - '!sources/imports/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update blocklists
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Run update
      run: ./scripts/update.sh
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release-${{ github.run_number }}
        name: Blocklist Release ${{ github.run_number }}
        make_latest: true
        files: |
          domains.txt
          ublacklist.txt
          adblock.txt
          hosts.txt
          hosts_ipv6.txt
          dnsmasq.txt
          pdnsd.txt
          unbound.txt
